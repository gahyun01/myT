  <form class="signup">
    <h1 class="jua-regular">회원가입</h1>
    <table>
      <tr>
        <td>고객번호</td>
        <td><input type="text" class="text" id="guest_no"></td>
      </tr>
      <tr class="tr1">
        <td>아이디</td>
        <td><input type="text" class="text1" id="user_id" placeholder="6~15자리 영문 또는 숫자"></td>
        <td><button type="submit" class="btn2">중복확인</button></td>
      </tr>
      <tr>
        <td>비밀번호</td>
        <td><input type="password" class="text" id="pwd" name="pw" onchange="pass()" placeholder="8~15자리 영문, 숫자 또는 문자">
        </td>
      </tr>
      <tr>
        <td>비밀번호 확인</td>
        <td><input type="password" class="text" id="pwd1" oninput="pass()" placeholder="8~15자리 영문, 숫자 또는 문자"></td>
      </tr>
      <tr>
        <td></td>
        <td><span id="pwConfirm"></span></td>
      </tr>
      <tr>
        <td>국문 성</td>
        <td><input type="text" class="text" id="k_lastnm"></td>
      </tr>
      <tr>
        <td>국문 이름</td>
        <td><input type="text" class="text" id="k_firstnm"></td>
      </tr>
      <tr>
        <td>영문 성</td>
        <td><input type="text" class="text" id="e_lastnm"></td>
      </tr>
      <tr>
        <td>영문 이름</td>
        <td><input type="text" class="text" id="e_firstnm"></td>
      </tr>
      <tr>
        <td>성별</td>
        <td>
          <label>
            <input type="radio" name="gender" value="MALE" />
            남자
          </label>

          <label>
            <input type="radio" name="gender" value="FEMALE" />
            여자
          </label>
        </td>
      </tr>
      <tr>
        <td class="textbg">생년월일 </td>
        <td><input type="text" class="textt" id="birth"></td>
        <td class="tea"> - </td>
        <td>●●●●●●●</td>
      </tr>
      <tr>
        <td>이메일</td>
        <td><input type="email" class="textt" id="email"></td>
        <td class="tea"> @ </td>
        <td>
          <select class="select">
            <option value="naver.com">naver.com</option>
            <option value="daum.net">daum.net</option>
            <option value="gmail.com">gmail.com</option>
            <option value="nate.com">nate.com</option>
            <option value="yahoo.com">yahoo.com</option>
          </select>
        </td>
      </tr>
      <!-- <tr>
        <td>전화번호</td>
        <td class="text3">
          <select class="select">
            <option value="010">010</option>
            <option value="011">011</option>
            <option value="016">016</option>
            <option value="017">017</option>

            <option value="019">019</option>

        <td><input type="text" class="text1" id="phone1"></td>
      </tr> -->
      <tr>
        <td>주소</td>
        <td><input type="text" class="text" id="addr"></td>
      </tr>
      <tr>
        <td>상세주소</td>
        <td><input type="text" class="text" id="address"></td>
      </tr>
      <tr>
        <td>등록 일시</td>
        <td><input type="datetime-local" id="reg_date" class="date"></td>
      </tr>
      <tr>
        <td colspan="2"><button type="submit" class="btn1">회원 가입</button></td>
      </tr>
    </table>
  </form>
